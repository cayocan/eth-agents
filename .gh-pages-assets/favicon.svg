<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="5" fill="#080b10"/>
  <!-- Ethereum logo: upper body -->
  <polygon points="16,3 9,16 16,20 23,16" fill="#627EEA"/>
  <!-- Lower body lighter -->
  <polygon points="16,22 9,17.5 16,29 23,17.5" fill="#627EEA" opacity="0.75"/>
  <!-- Center horizontal line gives depth - left dark, right light -->
  <polygon points="9,16 16,20 16,22 9,17.5" fill="#3d5fc4"/>
  <polygon points="23,16 16,20 16,22 23,17.5" fill="#8ba5f5"/>
</svg>